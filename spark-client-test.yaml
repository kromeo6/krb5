apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-client-script
  namespace: default
data:
  script.py: |
    import sys
    from pyspark.sql import SparkSession

    print("Initializing Spark Connect Session...")
    try:
        # Pass user_id explicitly
        spark = SparkSession.builder.remote("sc://spark-connect-kerberos-test-server:15002/;user_id=srv-dev-data-client@LAB.LOCAL").getOrCreate()
        print("Successfully connected to Spark Connect!")
        
        print("Executing SHOW DATABASES:")
        spark.sql("SHOW DATABASES").show()
        
        print("Creating table test_kerberos_hive_5...")
        spark.sql("CREATE TABLE IF NOT EXISTS test_kerberos_hive_5 (id INT, name STRING) USING PARQUET")

        print("Inserting data...")
        spark.sql("INSERT INTO test_kerberos_hive_5 VALUES (1, 'Roma'), (2, 'Kerberos')")

        print("Querying data...")
        spark.sql("SELECT * FROM test_kerberos_hive_5").show()
        
        print("Job finished successfully!")
        spark.stop()
    except Exception as e:
        print(f"Error during execution: {e}")
        sys.exit(1)
---
apiVersion: v1
kind: Pod
metadata:
  name: spark-connect-client
  namespace: default
spec:
  restartPolicy: Never
  containers:
  - name: pyspark-client
    image: python:3.9-slim
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Installing pyspark with connect dependencies..."
        pip install "pyspark[connect]==3.5.1"
        echo "Running Spark Connect Python script..."
        python /script.py
    volumeMounts:
    - name: script-vol
      mountPath: /script.py
      subPath: script.py
  volumes:
  - name: script-vol
    configMap:
      name: spark-client-script