apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-jaas-config
  namespace: default
data:
  jaas.conf: |
    com.sun.security.jgss.initiate {
      com.sun.security.auth.module.Krb5LoginModule required
      useKeyTab=true
      keyTab="/etc/security/keytabs/client.keytab"
      principal="srv-dev-data-client@LAB.LOCAL"
      doNotPrompt=true
      useTicketCache=false
      storeKey=true
      debug=true;
    };
